<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName www.tms.simple-source.com
    ServerAlias tms.simple-source.com

    ProxyPreserveHost On
    ProxyRequests Off

    LimitRequestBody 26214400

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Webhook — BEFORE the catch-all
    ProxyPass        /hooks/ http://127.0.0.1:9000/hooks/
    ProxyPassReverse /hooks/ http://127.0.0.1:9000/hooks/

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/www.tms.simple-source.com.error.log
    CustomLog ${APACHE_LOG_DIR}/www.tms.simple-source.com.access.log combined

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/tms.simple-source.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/tms.simple-source.com/privkey.pem
</VirtualHost>
</IfModule>
