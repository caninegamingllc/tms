server {
    listen 80;
    server_name tms.simple-source.com www.tms.simple-source.com;
    return 301 https://tms.simple-source.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tms.simple-source.com www.tms.simple-source.com;

    client_max_body_size 25M;

    ssl_certificate     /etc/letsencrypt/live/tms.simple-source.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tms.simple-source.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Deploy webhook — must come before catch-all
    location /hooks/ {
        proxy_pass http://127.0.0.1:9000/hooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Route Handler redirects may absolute using the internal bind address.
        proxy_redirect http://127.0.0.1:3001/ /;
        proxy_redirect http://localhost:3001/ /;
        proxy_redirect https://localhost:3001/ /;
    }
}
